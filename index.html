<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <title>Elite Snipers</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: 'Courier New', monospace;
            background: #000;
            overflow: hidden;
            color: #fff;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0; left: 0;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            touch-action: none;
        }

        #ui {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
        }

        /* === LANDSCAPE LOCK OVERLAY === */
        #rotateOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00ff00;
            font-size: 1.2rem;
            text-align: center;
            padding: 2rem;
        }
        #rotateOverlay .icon { font-size: 4rem; margin-bottom: 1rem; animation: rotate 2s infinite; }
        @keyframes rotate { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(90deg); } }

        @media (orientation: portrait) {
            #rotateOverlay { display: flex; }
        }

        /* === START MODAL === */
        #usernameModal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff00;
            padding: 1.5rem;
            text-align: center;
            pointer-events: all;
            z-index: 1000;
            width: min(90%, 400px);
            border-radius: 8px;
        }

        #usernameModal h1 {
            color: #00ff00;
            margin-bottom: 0.5rem;
            font-size: clamp(1.2rem, 5vw, 2rem);
            text-shadow: 0 0 10px #00ff00;
        }

        #usernameModal p {
            color: #888;
            margin-bottom: 1rem;
            font-size: clamp(0.7rem, 2.5vw, 0.9rem);
        }

        #usernameInput {
            background: #111;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            margin-bottom: 1rem;
            width: 100%;
            border-radius: 4px;
            -webkit-appearance: none;
        }

        #teamSelect {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            justify-content: center;
        }

        .teamBtn {
            background: #111;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 0.75rem 1.5rem;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            flex: 1;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        .teamBtn.red { border-color: #ff0000; color: #ff0000; }
        .teamBtn.blue { border-color: #0088ff; color: #0088ff; }
        .teamBtn:active, .teamBtn.red:active { background: #ff000033; }
        .teamBtn.blue:active { background: #0088ff33; }

        #startBtn {
            background: #00ff00;
            border: none;
            color: #000;
            padding: 0.75rem;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            width: 100%;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        #startBtn:active { opacity: 0.8; }

        /* === HUD — mobile-first compact === */
        #hud {
            position: absolute;
            top: env(safe-area-inset-top, 8px);
            left: env(safe-area-inset-left, 8px);
            padding-top: 8px;
            padding-left: 8px;
        }

        .stat {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff0066;
            padding: 4px 10px;
            margin-bottom: 4px;
            font-size: clamp(0.65rem, 2vw, 0.85rem);
            color: #00ff00;
            border-radius: 3px;
            backdrop-filter: blur(4px);
            pointer-events: all;
            -webkit-tap-highlight-color: transparent;
        }

        /* === SCOREBOARD — compact === */
        /* === SCOREBOARD — full screen watchlist overlay === */
        #scoreboard {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: transparent;
            z-index: 700;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            font-family: 'Courier New', monospace;
            pointer-events: all;
        }
        #scoreboard .sb-table-wrap {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid #00ff0022;
            border-radius: 8px;
            padding: 1rem 1.5rem;
            width: min(95%, 600px);
        }
        #scoreboard .sb-title {
            color: #00ff44;
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
        }
        #scoreboard .sb-table {
            width: min(95%, 600px);
            border-collapse: collapse;
        }
        #scoreboard .sb-table th {
            color: #666;
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 4px 8px;
            border-bottom: 1px solid #333;
            text-align: left;
        }
        #scoreboard .sb-table th:last-child,
        #scoreboard .sb-table td:last-child { text-align: right; }
        #scoreboard .sb-row {
            border-bottom: 1px solid #1a1a1a;
        }
        #scoreboard .sb-row td {
            padding: 6px 8px;
            font-size: 0.75rem;
        }
        #scoreboard .sb-row.me { background: rgba(0,255,68,0.08); }
        #scoreboard .sb-ticker { color: #fff; font-weight: 700; }
        #scoreboard .sb-price { color: #00ff44; font-weight: 700; }
        #scoreboard .sb-kd { color: #888; }
        #scoreboard .sb-team-red { border-left: 3px solid #ff0000; }
        #scoreboard .sb-team-blue { border-left: 3px solid #0088ff; }
        #scoreboard .sb-chart { width: 80px; height: 24px; }

        /* === ABILITIES — bottom corners === */
        #abilities {
            position: absolute;
            bottom: env(safe-area-inset-bottom, 12px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            padding-bottom: 12px;
        }

        .ability {
            background: rgba(0, 0, 0, 0.7);
            border: 2px solid #00ff00;
            padding: 8px;
            width: 60px;
            text-align: center;
            pointer-events: all;
            cursor: pointer;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            -webkit-tap-highlight-color: transparent;
        }
        .ability:active { background: rgba(0, 255, 0, 0.3); }
        .ability.cooldown { opacity: 0.4; }
        .ability-key { color: #00ff00; font-size: 1.1rem; font-weight: bold; }
        .ability-name { color: #aaa; font-size: 0.55rem; margin-top: 2px; }
        .ability-cd { color: #ff0000; font-size: 0.7rem; margin-top: 2px; }

        /* === CONTROLS HINT — hidden on mobile === */
        #controls {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff0044;
            padding: 8px 12px;
            font-size: 0.6rem;
            color: #666;
            border-radius: 3px;
        }
        #controls h4 { color: #00ff0088; margin-bottom: 4px; font-size: 0.65rem; }
        #controls div { margin-bottom: 1px; }

        /* === STREAK POPUP === */
        #streakPopup {
            position: absolute;
            top: 35%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 500;
            text-align: center;
        }
        .streak-text {
            font-size: clamp(1.5rem, 6vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px currentColor, 0 0 40px currentColor, 0 2px 4px rgba(0,0,0,0.8);
            animation: streakIn 0.15s ease-out, streakPulse 0.3s 0.15s ease-in-out 2, streakOut 0.5s 1.5s forwards;
            opacity: 0;
            animation-fill-mode: forwards;
        }
        @keyframes streakIn { from { opacity: 0; transform: scale(2.5); } to { opacity: 1; transform: scale(1); } }
        @keyframes streakPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        @keyframes streakOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-20px); } }
        @keyframes candleGrow { 0% { transform: scaleY(0); } 80% { transform: scaleY(1.1); } 100% { transform: scaleY(1); } }
        @keyframes screenFlash { 0% { opacity: 0.3; } 100% { opacity: 0; } }
        @keyframes particleBurst {
            0% { opacity: 1; transform: translate(-50%,-50%) rotate(var(--a,0deg)) translateY(0) scale(1); }
            100% { opacity: 0; transform: translate(-50%,-50%) rotate(var(--a,0deg)) translateY(-40px) scale(0); }
        }

        /* Flying candle that moves from center to HUD chart */
        .flying-candle {
            position: fixed;
            z-index: 9999;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* === DARK SOULS DEATH SCREEN === */
        #deathPopup {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 900;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #deathOverlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            opacity: 0;
            animation: deathFadeIn 0.4s ease-out forwards;
        }
        @keyframes deathFadeIn {
            0% { opacity: 0; }
            100% { opacity: 0.75; }
        }
        #deathText {
            position: relative;
            z-index: 1;
            font-family: 'Times New Roman', 'Georgia', serif;
            font-size: clamp(3rem, 12vw, 6rem);
            font-weight: 400;
            letter-spacing: 0.3em;
            color: #8b0000;
            text-shadow: 0 0 60px rgba(200,0,0,0.8), 0 0 120px rgba(139,0,0,0.4), 0 0 200px rgba(139,0,0,0.2);
            opacity: 0;
            transform: scale(1.8);
            animation: deathTextIn 1s cubic-bezier(0.2, 0.8, 0.2, 1) 0.2s forwards;
        }
        @keyframes deathTextIn {
            0% { opacity: 0; transform: scale(1.8); letter-spacing: 0.8em; }
            50% { opacity: 1; transform: scale(0.95); letter-spacing: 0.25em; }
            70% { transform: scale(1.05); }
            100% { opacity: 1; transform: scale(1); letter-spacing: 0.3em; }
        }
        #deathKiller {
            position: relative;
            z-index: 1;
            font-family: 'Times New Roman', 'Georgia', serif;
            font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: #777;
            letter-spacing: 0.15em;
            opacity: 0;
            animation: deathSubIn 0.5s ease-out 1s forwards;
            margin-top: 0.8rem;
        }
        @keyframes deathSubIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 0.8; transform: translateY(0); }
        }
        #respawnBtn {
            position: relative;
            z-index: 1;
            margin-top: 1.5rem;
            background: none;
            border: 1px solid #8b000044;
            color: #8b0000;
            font-family: 'Times New Roman', 'Georgia', serif;
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            letter-spacing: 0.15em;
            padding: 0.6rem 2rem;
            cursor: pointer;
            pointer-events: all;
            opacity: 0;
            animation: deathSubIn 0.5s ease-out 1.3s forwards;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s;
        }
        #respawnBtn:hover, #respawnBtn:active {
            border-color: #cc0000;
            color: #ff2222;
            text-shadow: 0 0 20px rgba(255,0,0,0.4);
        }

        /* === MATCH END SCREEN === */
        #matchEnd {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 950; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none;
        }
        #matchEndOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; opacity: 0;
            animation: deathFadeIn 0.6s ease-out forwards;
        }
        #matchEndContent {
            position: relative; z-index: 1; text-align: center;
            max-width: min(95%, 600px); width: 100%;
        }
        #matchEndTitle {
            font-family: 'Times New Roman', 'Georgia', serif;
            font-size: clamp(3rem, 12vw, 6rem); font-weight: 400;
            letter-spacing: 0.3em; opacity: 0; transform: scale(1.8);
            animation: deathTextIn 1s cubic-bezier(0.2,0.8,0.2,1) 0.2s forwards;
        }
        #matchEnd.win #matchEndTitle {
            color: #00cc44;
            text-shadow: 0 0 60px rgba(0,200,68,0.8), 0 0 120px rgba(0,200,68,0.4);
        }
        #matchEnd.lose #matchEndTitle {
            color: #8b0000;
            text-shadow: 0 0 60px rgba(200,0,0,0.8), 0 0 120px rgba(139,0,0,0.4);
        }
        #matchEnd.draw #matchEndTitle {
            color: #888;
            text-shadow: 0 0 60px rgba(136,136,136,0.6);
        }
        #matchEndScore {
            font-family: monospace; font-size: clamp(1.5rem, 6vw, 3rem);
            color: #fff; letter-spacing: 0.2em; margin-top: 0.5rem;
            opacity: 0; animation: deathSubIn 0.5s ease-out 0.8s forwards;
        }
        #matchEndMVP {
            font-family: monospace; font-size: clamp(0.8rem, 3vw, 1.2rem);
            color: #ffd700; margin-top: 1rem;
            opacity: 0; animation: deathSubIn 0.5s ease-out 1.2s forwards;
        }
        #matchEndStats {
            font-family: monospace; font-size: clamp(0.6rem, 2vw, 0.85rem);
            color: #888; margin-top: 1rem; line-height: 1.6;
            opacity: 0; animation: deathSubIn 0.5s ease-out 1.5s forwards;
        }
        #matchEndStats .me-row { color: #fff; }
        #matchEndStats .me-red { color: #ff4444; }
        #matchEndStats .me-blue { color: #4488ff; }
        #matchEndTimer {
            font-family: monospace; font-size: 0.9rem;
            color: #555; margin-top: 1.5rem;
            opacity: 0; animation: deathSubIn 0.5s ease-out 2s forwards;
        }

        /* === TEAM SCORE HUD === */
        #teamScore {
            position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
            z-index: 500; font-family: monospace; font-size: clamp(0.9rem, 3vw, 1.3rem);
            background: rgba(0,0,0,0.7); border: 1px solid #333; border-radius: 6px;
            padding: 4px 16px; letter-spacing: 0.1em; pointer-events: none;
        }
        .ts-red { color: #ff4444; font-weight: 700; }
        .ts-blue { color: #4488ff; font-weight: 700; }
        .ts-sep { color: #555; margin: 0 6px; }
        .ts-limit { color: #555; font-size: 0.75em; }

        /* === SHOP PANEL === */
        #shopPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.92);
            border: 2px solid #ffd700;
            border-radius: 10px;
            padding: 1rem;
            pointer-events: all;
            z-index: 600;
            width: min(95%, 500px);
            max-height: 80vh;
            overflow-y: auto;
        }
        #shopPanel h2 {
            color: #ffd700;
            font-size: 1rem;
            text-align: center;
            margin-bottom: 0.5rem;
            letter-spacing: 0.1em;
        }
        #shopPanel .shop-gold {
            text-align: center;
            color: #ffd700;
            font-size: 0.85rem;
            margin-bottom: 0.75rem;
        }
        .shop-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            margin-bottom: 0.3rem;
            background: rgba(255,215,0,0.05);
            border: 1px solid #ffd70033;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            -webkit-tap-highlight-color: transparent;
        }
        .shop-item:hover:not(.disabled) {
            background: rgba(255,215,0,0.15);
            border-color: #ffd700;
        }
        .shop-item:active:not(.disabled) {
            background: rgba(255,215,0,0.25);
        }
        .shop-item.disabled {
            opacity: 0.35;
            cursor: default;
        }
        .shop-icon { font-size: 1.3rem; width: 2rem; text-align: center; }
        .shop-name { color: #fff; font-size: 0.8rem; font-weight: bold; flex: 1; }
        .shop-cost { color: #ffd700; font-size: 0.75rem; font-weight: bold; }
        .shop-desc { color: #888; font-size: 0.6rem; width: 100%; margin-top: 0.1rem; }
        .shop-item { flex-wrap: wrap; }

        .hidden { display: none !important; }

        /* === MODE SELECT === */
        #modeSelect {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            justify-content: center;
        }
        .modeBtn {
            background: #111;
            border: 2px solid #00ff00;
            color: #00ff00;
            padding: 0.5rem 1rem;
            font-size: 0.8rem;
            font-family: 'Courier New', monospace;
            cursor: pointer;
            flex: 1;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }
        .modeBtn:active { background: #00ff0033; }
        .modeBtn.selected { background: #00ff00; color: #000; }

        /* === CHAT BOX === */
        #chatBox {
            position: absolute;
            bottom: 100px;
            right: 8px;
            width: min(250px, 40vw);
            pointer-events: all;
            z-index: 600;
        }
        #chatMessages {
            background: rgba(0,0,0,0.6);
            border: 1px solid #00ff0033;
            border-radius: 4px;
            padding: 4px 6px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.6rem;
            color: #ccc;
            margin-bottom: 4px;
        }
        #chatMessages .chat-msg { margin-bottom: 2px; }
        #chatMessages .chat-msg .chat-name-red { color: #ff4444; }
        #chatMessages .chat-msg .chat-name-blue { color: #4488ff; }
        #chatMessages .chat-sys { color: #888; font-style: italic; }
        #chatInput {
            width: 100%;
            background: rgba(0,0,0,0.7);
            border: 1px solid #00ff0044;
            color: #00ff00;
            padding: 4px 8px;
            font-size: 0.65rem;
            font-family: 'Courier New', monospace;
            border-radius: 3px;
            -webkit-appearance: none;
        }
        #chatInput::placeholder { color: #00ff0044; }

        /* === KILL FEED — above minimap, bottom left === */
        #killFeed {
            position: absolute;
            bottom: 140px;
            left: 8px;
            width: min(200px, 40vw);
            pointer-events: none;
        }

        .kill-message {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #00ff0044;
            padding: 2px 8px;
            margin-bottom: 2px;
            text-align: left;
            font-size: 0.55rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            animation: fadeIn 0.3s, fadeOut 0.5s 2.5s;
        }
        .kill-message.buy { border-color: #00ff4444; color: #00ff44; }
        .kill-message.sell { border-color: #ff444444; color: #ff4444; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* === MINIMAP === */
        .minimap {
            position: absolute;
            bottom: 8px;
            left: 8px;
            width: 120px;
            height: 120px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid #00ff0066;
            border-radius: 4px;
        }

        /* === MOBILE TWEAKS === */
        /* === MOBILE RESPONSIVE === */
        @media (max-width: 768px), (max-height: 500px) {
            #controls { display: none !important; }

            /* HUD terminal */
            #terminal { padding: 4px 8px; min-width: 120px; }
            #terminal #ticker { font-size: 0.8rem; }
            #terminal #price { font-size: 0.7rem; }
            #terminal #pctChange { font-size: 0.55rem; }
            #hudChart { width: 100px; height: 35px; }

            /* Abilities bar */
            .ability { width: 44px; padding: 5px; }
            .ability-key { font-size: 0.8rem; }
            .ability-name { font-size: 0.45rem; }

            /* Minimap */
            .minimap { width: 80px; height: 80px; }

            /* Kill feed */
            #killFeed { bottom: 100px; width: min(180px, 40vw); }
            .kill-message { font-size: 0.45rem; padding: 1px 6px; }

            /* Scoreboard */
            #scoreboard { padding: 0.5rem; }
            #scoreboard .sb-table-wrap { padding: 0.5rem 0.8rem; }
            #scoreboard .sb-title { font-size: 0.9rem; margin-bottom: 0.5rem; }
            #scoreboard .sb-table th { font-size: 0.5rem; padding: 3px 4px; }
            #scoreboard .sb-row td { font-size: 0.6rem; padding: 4px; }
            #scoreboard .sb-chart { width: 50px; height: 18px; }
            #scoreboard .sb-price span { display: none; }

            /* Death screen */
            #deathPopup { padding: 0.5rem; }
            #deathText { font-size: clamp(1.8rem, 8vw, 3.5rem); }
            #deathKiller { font-size: clamp(0.6rem, 2.5vw, 0.9rem); }
            #deathChart { width: 180px !important; height: 55px !important; }
            #deathCandle { transform: scale(0.6); }
            #respawnBtn { font-size: clamp(0.65rem, 2vw, 0.85rem); padding: 0.4rem 1.2rem; margin-top: 0.5rem; }

            /* Shop */
            #shopPanel { padding: 0.6rem; }
            #shopPanel h2 { font-size: 0.8rem; }
            .shop-item { padding: 0.35rem; gap: 0.3rem; }
            .shop-icon { font-size: 1rem; width: 1.5rem; }
            .shop-name { font-size: 0.65rem; }
            .shop-cost { font-size: 0.6rem; }
            .shop-desc { font-size: 0.5rem; }

            /* Start screen */
            #usernameModal { padding: 1rem; }
            #usernameModal h1 { font-size: clamp(1rem, 4vw, 1.5rem); }
            .modeBtn { padding: 0.4rem 0.5rem; font-size: 0.7rem; }
            .teamBtn { padding: 0.5rem 0.8rem; font-size: 0.8rem; }

            /* Chat */
            #chatBox { width: min(200px, 35vw); bottom: 90px; }
            #chatMessages { max-height: 80px; font-size: 0.5rem; }
            #chatInput { font-size: 0.55rem; }

            /* Streak popup */
            #streakPopup { top: 30%; }
        }
    </style>
</head>
<body>
    <!-- Force landscape overlay -->
    <div id="rotateOverlay">
        <div class="icon">📱</div>
        <div>Rotate your device to<br><strong>LANDSCAPE</strong><br>to play</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ui">
        <div id="usernameModal">
            <h1>ELITE SNIPERS</h1>
            <p>A tribute to the legendary Warcraft III custom game</p>
            <input type="text" id="usernameInput" placeholder="Enter your name..." maxlength="12">
            <div id="modeSelect">
                <button class="modeBtn selected" data-mode="offline">OFFLINE</button>
                <button class="modeBtn" data-mode="online">ONLINE</button>
            </div>
            <div id="teamSelect">
                <button class="teamBtn red" data-team="red">RED</button>
                <button class="teamBtn blue" data-team="blue">BLUE</button>
            </div>
            <button id="startBtn">START GAME</button>
        </div>

        <div id="hud" class="hidden">
            <div id="terminal" style="
                background:rgba(0,0,0,0.85);
                border:1px solid #00ff0033;
                border-radius:6px;
                padding:6px 10px;
                min-width:160px;
                font-family:'Courier New',monospace;
                pointer-events:all;
            ">
                <div style="display:flex;align-items:baseline;gap:6px;">
                    <span id="ticker" style="color:#00ff44;font-size:1rem;font-weight:900;letter-spacing:0.05em;">$YOU</span>
                    <span id="price" style="color:#fff;font-size:0.9rem;font-weight:700;">1.00</span>
                    <span id="pctChange" style="color:#00ff44;font-size:0.7rem;">+0.0%</span>
                </div>
                <div style="display:flex;gap:8px;margin-top:3px;font-size:0.6rem;color:#888;">
                    <span>K: <span id="killCount" style="color:#00ff44;">0</span></span>
                    <span>D: <span id="deathCount" style="color:#ff4444;">0</span></span>
                    <span><span id="goldCount" style="color:#ffd700;">0c</span></span>
                </div>
                <canvas id="hudChart" width="150" height="50" style="margin-top:4px;border-radius:3px;background:#0a0a0a;"></canvas>
            </div>
        </div>

        <div id="scoreboard" class="hidden"></div>

        <div id="abilities" class="hidden">
            <div class="ability" data-ability="windwalk">
                <div class="ability-key">Q</div>
                <div class="ability-name">Wind</div>
                <div class="ability-cd"></div>
            </div>
            <div class="ability" data-ability="farsight">
                <div class="ability-key">E</div>
                <div class="ability-name">Sight</div>
                <div class="ability-cd"></div>
            </div>
            <div class="ability" id="shopBtn">
                <div class="ability-key">B</div>
                <div class="ability-name">Shop</div>
                <div class="ability-cd"></div>
            </div>
            <div class="ability" id="scoreBtn">
                <div class="ability-key">TAB</div>
                <div class="ability-name">Score</div>
                <div class="ability-cd"></div>
            </div>
        </div>


        <div id="shopPanel" class="hidden">
            <h2>⚔ ARMORY ⚔</h2>
            <div class="shop-gold" id="shopGold">Gold: 0</div>
            <div id="shopItems"></div>
        </div>

        <div id="killFeed"></div>
        <div id="streakPopup"></div>

        <div id="debugPanel" style="
            position:absolute; top:50%; right:8px; transform:translateY(-50%);
            background:rgba(0,0,0,0.85); border:1px solid #ff00ff66; border-radius:6px;
            padding:8px 12px; font-size:0.65rem; color:#ff00ff; pointer-events:all;
            display:none; z-index:800; min-width:120px;
        ">
            <div style="font-weight:bold; margin-bottom:6px; font-size:0.75rem;">DEBUG [~]</div>
            <div id="debugFPS" style="color:#aaa; margin-bottom:4px;">FPS: --</div>
            <label style="display:block; margin-bottom:4px; cursor:pointer;">
                <input type="checkbox" id="dbgGodMode"> God Mode
            </label>
            <label style="display:block; margin-bottom:4px; cursor:pointer;">
                <input type="checkbox" id="dbgShowFPS" checked> Show FPS
            </label>
            <button onclick="document.querySelectorAll('.kill-message').forEach(e=>e.remove())" style="
                background:#ff00ff22; border:1px solid #ff00ff44; color:#ff00ff; padding:2px 8px;
                font-size:0.6rem; cursor:pointer; border-radius:3px; margin-top:4px; width:100%;
            ">Clear Kill Feed</button>
        </div>

        <div id="deathPopup" class="hidden">
            <div id="deathOverlay"></div>
            <div id="deathCandle" style="
                position:relative; z-index:1; display:flex; flex-direction:column;
                align-items:center; animation:deathSubIn 0.5s ease-out 0.1s forwards; opacity:0;
            ">
                <div style="width:5px;height:40px;background:linear-gradient(to bottom,#cc0000,#ff2222);box-shadow:0 0 10px #ff2222;margin-bottom:2px;animation:candleGrow 0.3s ease-out 0.3s both;transform-origin:top;"></div>
                <div style="width:24px;height:80px;background:linear-gradient(to bottom,#cc0000,#ff2222);box-shadow:0 0 20px #ff2222,0 0 40px #cc000066;border-radius:2px;animation:candleGrow 0.25s ease-out 0.2s both;transform-origin:top;"></div>
                <div style="width:5px;height:16px;background:#990000;margin-top:2px;"></div>
            </div>
            <div id="deathText">LIQUIDATED</div>
            <canvas id="deathChart" width="250" height="80" style="
                position:relative; z-index:1; border-radius:4px; background:#0a0a0a;
                border:1px solid #ff222233; margin-top:0.5rem;
                opacity:0; animation:deathSubIn 0.5s ease-out 1s forwards;
            "></canvas>
            <div id="deathKiller"></div>
            <button id="respawnBtn">RETURN TO SPAWN</button>
        </div>
        <!-- Match End Screen -->
        <div id="matchEnd" class="hidden">
            <div id="matchEndOverlay"></div>
            <div id="matchEndContent">
                <div id="matchEndTitle">VICTORY</div>
                <div id="matchEndScore"></div>
                <div id="matchEndMVP"></div>
                <div id="matchEndStats"></div>
                <div id="matchEndTimer">Next match in...</div>
            </div>
        </div>

        <!-- Team Score HUD -->
        <div id="teamScore" class="hidden">
            <span class="ts-red"><span id="tsRedKills">0</span></span>
            <span class="ts-sep">—</span>
            <span class="ts-blue"><span id="tsBlueKills">0</span></span>
            <span class="ts-limit">/ <span id="tsLimit">50</span></span>
        </div>

        <canvas class="minimap hidden" id="minimap"></canvas>

        <div id="chatBox" class="hidden">
            <div id="chatMessages"></div>
            <input type="text" id="chatInput" placeholder="Press Enter to chat..." maxlength="200">
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script type="module" src="game.js?v=20260405b"></script>
</body>
</html>
